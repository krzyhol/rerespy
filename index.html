<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReRespo — Przepisy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #e2ddd6;
      --accent: #c8854a;
      --accent2: #5a8f6e;
      --text: #2d2a26;
      --text2: #6b6560;
      --text3: #9e9990;
      --tag-bg: #f0ede8;
      --tag-color: #6b6560;
      --shadow: 0 2px 8px rgba(0,0,0,.07);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.5px;
      white-space: nowrap;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); background: white; }
    #search::placeholder { color: var(--text3); }

    /* ── LAYOUT ── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: static !important; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 88px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .filter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .filter-card h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text3);
      margin-bottom: 12px;
    }

    /* slot buttons */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .slot-btn {
      padding: 7px 4px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .slot-btn:hover { border-color: var(--accent); color: var(--accent); }
    .slot-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* calorie range */
    .range-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--text2);
    }
    .range-row input[type=number] {
      width: 70px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
    }
    .range-row input[type=number]:focus { border-color: var(--accent); }

    /* tag cloud */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-pill {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .tag-pill:hover { border-color: var(--accent); color: var(--accent); }
    .tag-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* reset */
    #reset-filters {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: none;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    #reset-filters:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main {}
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-count {
      font-size: 14px;
      color: var(--text3);
    }
    .sort-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    /* ── GRID ── */
    #recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .recipe-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s, border-color .15s;
    }
    .recipe-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      border-color: #d9d3cb;
    }
    .card-slot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .card-slot .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 14px;
    }
    .card-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .macro-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 7px 4px;
      text-align: center;
    }
    .macro-box .val {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .macro-box .lbl {
      display: block;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }
    .macro-box.kcal .val { color: var(--accent); }
    .macro-box.protein .val { color: var(--accent2); }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .card-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-color);
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state p { font-size: 16px; margin-top: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      padding: 20px;
      overflow-y: auto;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      max-width: 720px;
      width: 100%;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .modal-title-block { flex: 1; }
    .modal-slot {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .modal-name {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }
    .modal-close {
      background: var(--surface2);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      font-size: 18px;
      flex-shrink: 0;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 24px 28px 28px; }

    .modal-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .modal-macro {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
    }
    .modal-macro .val { font-size: 20px; font-weight: 700; color: var(--text); }
    .modal-macro .lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .modal-macro.kcal .val { color: var(--accent); }
    .modal-macro.protein .val { color: var(--accent2); }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .ingredient-list { list-style: none; margin-bottom: 24px; }
    .ingredient-list li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--surface2);
      font-size: 14px;
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .ing-name { color: var(--text); }
    .ing-amount {
      font-weight: 600;
      color: var(--text2);
      white-space: nowrap;
      margin-left: 12px;
    }
    .ing-desc { font-size: 12px; color: var(--text3); margin-left: 8px; }

    .steps-list { list-style: none; margin-bottom: 20px; }
    .step-item {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
    }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-content { flex: 1; }
    .step-desc { font-size: 14px; line-height: 1.55; color: var(--text); }
    .step-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .step-badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text3);
    }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-color);
    }

    /* loading */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: var(--text3);
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">ReRespo</span>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="Szukaj przepisu, składnika..." autocomplete="off" />
    </div>
  </div>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="filter-card">
      <h3>Posiłek</h3>
      <div class="slot-grid" id="slot-filters"></div>
    </div>

    <div class="filter-card">
      <h3>Kalorie</h3>
      <div class="range-row">
        <input type="number" id="cal-min" placeholder="Min" min="0" />
        <span>—</span>
        <input type="number" id="cal-max" placeholder="Max" min="0" />
        <span>kcal</span>
      </div>
    </div>

    <div class="filter-card">
      <h3>Tagi</h3>
      <div class="tag-cloud" id="tag-filters"></div>
    </div>

    <button id="reset-filters">Wyczysc filtry</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="results-bar">
      <span class="results-count" id="results-count"></span>
      <select class="sort-select" id="sort-select">
        <option value="default">Kolejnosc domyslna</option>
        <option value="name">Nazwa A–Z</option>
        <option value="cal-asc">Kalorie rosnaco</option>
        <option value="cal-desc">Kalorie malejaco</option>
        <option value="protein">Bialko (max)</option>
      </select>
    </div>
    <div id="recipe-grid">
      <div class="loading">Ladowanie przepisow...</div>
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-block">
        <div class="modal-slot" id="modal-slot"></div>
        <div class="modal-name" id="modal-name"></div>
      </div>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let allRecipes = [];
let activeSlots = new Set();
let activeTags = new Set();

const slotNames = {
  1: 'Posilek 1', 2: 'Posilek 2', 3: 'Posilek 3',
  4: 'Posilek 4', 5: 'Posilek 5', 6: 'Posilek 6'
};

async function loadRecipes() {
  const res = await fetch('./recipes.json');
  const data = await res.json();
  allRecipes = data.recipes || [];
  buildFilters();
  render();
}

function buildFilters() {
  // slots
  const slots = [...new Set(allRecipes.map(r => r.meal_slot?.number).filter(Boolean))].sort((a,b)=>a-b);
  const slotGrid = document.getElementById('slot-filters');
  slotGrid.innerHTML = '';
  slots.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn';
    btn.textContent = s;
    btn.title = slotNames[s] || `Posilek ${s}`;
    btn.dataset.slot = s;
    btn.addEventListener('click', () => {
      activeSlots.has(s) ? activeSlots.delete(s) : activeSlots.add(s);
      btn.classList.toggle('active');
      render();
    });
    slotGrid.appendChild(btn);
  });

  // tags
  const tagCount = {};
  allRecipes.forEach(r => (r.tags || []).forEach(t => tagCount[t] = (tagCount[t]||0)+1));
  const tags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  const tagCloud = document.getElementById('tag-filters');
  tagCloud.innerHTML = '';
  tags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.textContent = tag;
    pill.addEventListener('click', () => {
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      pill.classList.toggle('active');
      render();
    });
    tagCloud.appendChild(pill);
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const calMin = parseInt(document.getElementById('cal-min').value) || 0;
  const calMax = parseInt(document.getElementById('cal-max').value) || Infinity;
  const sort = document.getElementById('sort-select').value;

  let list = allRecipes.filter(r => {
    if (activeSlots.size && !activeSlots.has(r.meal_slot?.number)) return false;
    if (activeTags.size && !([...activeTags].every(t => (r.tags||[]).includes(t)))) return false;
    const cal = r.nutrition?.calories || 0;
    if (cal < calMin || cal > calMax) return false;
    if (q) {
      const haystack = [
        r.name,
        ...(r.tags||[]),
        ...(r.ingredients||[]).map(i=>i.name),
        ...(r.steps||[]).map(s=>s.description)
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'name') list.sort((a,b)=>a.name.localeCompare(b.name,'pl'));
  else if (sort === 'cal-asc') list.sort((a,b)=>(a.nutrition?.calories||0)-(b.nutrition?.calories||0));
  else if (sort === 'cal-desc') list.sort((a,b)=>(b.nutrition?.calories||0)-(a.nutrition?.calories||0));
  else if (sort === 'protein') list.sort((a,b)=>(b.nutrition?.macros?.protein_g||0)-(a.nutrition?.macros?.protein_g||0));

  return list;
}

function formatSlot(r) {
  const n = r.meal_slot?.number;
  const tw = r.meal_slot?.time_window;
  const from = tw?.from, to = tw?.to;
  const time = from && to ? ` · ${from}–${to}` : '';
  return n ? `Posilek ${n}${time}` : '';
}

function render() {
  const list = getFiltered();
  document.getElementById('results-count').textContent = `${list.length} przepisow`;
  const grid = document.getElementById('recipe-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:#ccc;margin:0 auto 12px;display:block"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>Brak przepisow spelniajacych kryteria.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(r => {
    const n = r.nutrition || {};
    const m = n.macros || {};
    const tags = (r.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
    return `<div class="recipe-card" data-id="${r.id}" tabindex="0">
      <div class="card-slot"><span class="dot"></span>${formatSlot(r)}</div>
      <div class="card-name">${r.name}</div>
      <div class="card-macros">
        <div class="macro-box kcal"><span class="val">${n.calories||'–'}</span><span class="lbl">kcal</span></div>
        <div class="macro-box protein"><span class="val">${m.protein_g||'–'}g</span><span class="lbl">Bialko</span></div>
        <div class="macro-box"><span class="val">${m.carbs_g||'–'}g</span><span class="lbl">Wegle</span></div>
        <div class="macro-box"><span class="val">${m.fat_g||'–'}g</span><span class="lbl">Tluszcz</span></div>
      </div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');

  grid.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openModal(card.dataset.id); });
  });
}

function openModal(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;
  const n = r.nutrition || {};
  const m = n.macros || {};

  document.getElementById('modal-slot').textContent = formatSlot(r);
  document.getElementById('modal-name').textContent = r.name;

  const ingredients = (r.ingredients||[]).map(i => `
    <li>
      <span class="ing-name">${i.name}</span>
      <span>
        <span class="ing-amount">${i.amount} ${i.unit}</span>
        ${i.serving_description ? `<span class="ing-desc">(${i.serving_description})</span>` : ''}
      </span>
    </li>`).join('');

  const steps = (r.steps||[]).sort((a,b)=>a.order-b.order).map(s => {
    const dur = s.duration_minutes?.min || s.duration_minutes?.max
      ? ` <span class="step-badge">${[s.duration_minutes.min,s.duration_minutes.max].filter(Boolean).join('–')} min</span>` : '';
    const tech = s.technique && s.technique!=='inne' ? `<span class="step-badge">${s.technique}</span>` : '';
    return `<li class="step-item">
      <div class="step-num">${s.order}</div>
      <div class="step-content">
        <div class="step-desc">${s.description}</div>
        ${dur||tech ? `<div class="step-meta">${tech}${dur}</div>` : ''}
      </div>
    </li>`;
  }).join('');

  const tags = (r.tags||[]).map(t=>`<span class="modal-tag">${t}</span>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-macros">
      <div class="modal-macro kcal"><div class="val">${n.calories||'–'}</div><div class="lbl">kcal</div></div>
      <div class="modal-macro protein"><div class="val">${m.protein_g||'–'} g</div><div class="lbl">Bialko</div></div>
      <div class="modal-macro"><div class="val">${m.carbs_g||'–'} g</div><div class="lbl">Weglowodany</div></div>
      <div class="modal-macro"><div class="val">${m.fat_g||'–'} g</div><div class="lbl">Tluszcze</div></div>
    </div>
    ${ingredients ? `<p class="section-title">Skladniki</p><ul class="ingredient-list">${ingredients}</ul>` : ''}
    ${steps ? `<p class="section-title">Przygotowanie</p><ol class="steps-list">${steps}</ol>` : ''}
    ${tags ? `<p class="section-title">Tagi</p><div class="modal-tags">${tags}</div>` : ''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// events
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort-select').addEventListener('change', render);
document.getElementById('cal-min').addEventListener('input', render);
document.getElementById('cal-max').addEventListener('input', render);

document.getElementById('reset-filters').addEventListener('click', () => {
  activeSlots.clear();
  activeTags.clear();
  document.querySelectorAll('.slot-btn.active, .tag-pill.active').forEach(el => el.classList.remove('active'));
  document.getElementById('search').value = '';
  document.getElementById('cal-min').value = '';
  document.getElementById('cal-max').value = '';
  document.getElementById('sort-select').value = 'default';
  render();
});

loadRecipes().catch(err => {
  document.getElementById('recipe-grid').innerHTML =
    `<div class="empty-state"><p>Blad ladowania: ${err.message}</p><p style="font-size:12px;margin-top:8px">Uruchom serwer HTTP w tym folderze, np.:<br><code>python3 -m http.server 8080</code></p></div>`;
});
</script>
</body>
</html>
