<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReRespo — Przepisy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --surface2: #242424;
      --surface3: #2e2e2e;
      --border: #2a2a2a;
      --accent: #f97316;
      --accent-dim: rgba(249,115,22,.15);
      --accent2: #4ade80;
      --text: #f5f5f5;
      --text2: #a3a3a3;
      --text3: #6b6b6b;
      --tag-bg: #242424;
      --tag-color: #a3a3a3;
      --shadow: 0 8px 32px rgba(0,0,0,.5);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: rgba(14,14,14,.9);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 68px;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    .search-wrap {
      flex: 1;
      position: relative;
      max-width: 520px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 10px 16px 10px 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    #search:focus { border-color: var(--accent); background: var(--surface); }
    #search::placeholder { color: var(--text3); }

    /* ── LAYOUT ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .page { grid-template-columns: 1fr; padding: 16px; }
      .sidebar { position: static !important; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 96px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .filter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .filter-card h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text3);
      margin-bottom: 14px;
    }

    /* slot buttons */
    .slot-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .slot-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
    }
    .slot-btn:hover { border-color: var(--accent); color: var(--accent); }
    .slot-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* calorie range */
    .range-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--text2);
    }
    .range-row input[type=number] {
      width: 68px;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface2);
      color: var(--text);
      outline: none;
    }
    .range-row input[type=number]:focus { border-color: var(--accent); }

    /* tag cloud */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-pill {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .tag-pill:hover { border-color: var(--accent); color: var(--accent); }
    .tag-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* reset */
    #reset-filters {
      width: 100%;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: none;
      color: var(--text3);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }
    #reset-filters:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main {}
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .results-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
    }
    .sort-select {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    /* ── GRID ── */
    #recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(288px, 1fr));
      gap: 16px;
    }

    .recipe-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .card-illustration { display: block; width: 100%; height: 168px; overflow: hidden; position: relative; }
    .card-illustration svg { width: 100%; height: 100%; display: block; }
    .card-illustration::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(26,26,26,.9) 100%);
    }
    .card-body { padding: 16px 18px 18px; }
    .modal-illustration { width: 100%; height: 240px; overflow: hidden; position: relative; }
    .modal-illustration svg { width: 100%; height: 100%; display: block; }
    .modal-illustration::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, var(--surface) 100%);
    }

    .card-slot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      margin-bottom: 8px;
      background: var(--accent-dim);
      padding: 3px 9px;
      border-radius: 20px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 14px;
    }
    .card-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .macro-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 8px 4px;
      text-align: center;
    }
    .macro-box .val {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .macro-box .lbl {
      display: block;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 500;
    }
    .macro-box.kcal { background: var(--accent-dim); }
    .macro-box.kcal .val { color: var(--accent); }
    .macro-box.protein .val { color: var(--accent2); }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .card-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface3);
      color: var(--text3);
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
    }
    .empty-state p { font-size: 16px; margin-top: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      padding: 20px;
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 740px;
      width: 100%;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
    }
    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .modal-title-block { flex: 1; }
    .modal-slot {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .modal-name {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
    }
    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      font-size: 16px;
      flex-shrink: 0;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }

    .modal-body { padding: 24px 28px 32px; }

    .modal-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .modal-macro {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px 10px;
      text-align: center;
    }
    .modal-macro .val { font-size: 22px; font-weight: 800; color: var(--text); }
    .modal-macro .lbl { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }
    .modal-macro.kcal { background: var(--accent-dim); }
    .modal-macro.kcal .val { color: var(--accent); }
    .modal-macro.protein .val { color: var(--accent2); }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin-bottom: 14px;
    }

    .ingredient-list { list-style: none; margin-bottom: 28px; }
    .ingredient-list li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .ing-name { color: var(--text); }
    .ing-amount {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      margin-left: 12px;
    }
    .ing-desc { font-size: 12px; color: var(--text3); margin-left: 8px; }

    .steps-list { list-style: none; margin-bottom: 24px; }
    .step-item {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
    }
    .step-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-content { flex: 1; }
    .step-desc { font-size: 14px; line-height: 1.6; color: var(--text2); }
    .step-meta {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .step-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface3);
      color: var(--text3);
    }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-tag {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--surface3);
      color: var(--text2);
    }

    /* loading */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px;
      color: var(--text3);
      font-size: 15px;
    }

    /* ── RATINGS ── */
    .stars-row {
      display: inline-flex;
      gap: 2px;
      align-items: center;
    }
    .star {
      color: var(--surface3);
      font-size: 15px;
      line-height: 1;
      transition: color .1s, transform .1s;
      cursor: default;
    }
    .star.filled { color: var(--accent); }
    .star.clickable { cursor: pointer; }
    .star.clickable:hover,
    .star.clickable:hover ~ .star { color: var(--surface3); }
    .stars-row:hover .star.clickable { color: var(--accent); }
    .stars-row .star.clickable:hover ~ .star.clickable { color: var(--surface3); }

    .card-rating {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
    }
    .rating-count {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
    }
    .rating-avg {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .modal-rating {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .modal-rating .stars-row .star { font-size: 22px; }
    .modal-rating-label {
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }
    .modal-rating-info {
      font-size: 12px;
      color: var(--text3);
      margin-left: auto;
    }
    .rating-voted-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 9px;
      border-radius: 20px;
    }
    /* ── NICK DIALOG ── */
    .nick-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 300;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
    .nick-overlay.open { display: flex; }
    .nick-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
    }
    .nick-dialog h2 { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .nick-dialog p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
    .nick-dialog p b { color: var(--accent); }
    #nick-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    #nick-input:focus { border-color: var(--accent); }
    #nick-input::placeholder { color: var(--text3); font-weight: 400; }
    .nick-actions { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1; padding: 11px;
      background: var(--accent); color: white; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      padding: 11px 16px; background: none; color: var(--text3);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 40px;
      font-size: 13px; font-weight: 600; box-shadow: var(--shadow);
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 400; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.toast-error { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">Re<span>Respo</span></span>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="Szukaj przepisu, składnika..." autocomplete="off" />
    </div>
  </div>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="filter-card">
      <h3>Posiłek</h3>
      <div class="slot-grid" id="slot-filters"></div>
    </div>

    <div class="filter-card">
      <h3>Kalorie</h3>
      <div class="range-row">
        <input type="number" id="cal-min" placeholder="Min" min="0" />
        <span>—</span>
        <input type="number" id="cal-max" placeholder="Max" min="0" />
        <span>kcal</span>
      </div>
    </div>

    <div class="filter-card">
      <h3>Tagi</h3>
      <div class="tag-cloud" id="tag-filters"></div>
    </div>

    <button id="reset-filters">Wyczysc filtry</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="results-bar">
      <span class="results-count" id="results-count"></span>
      <select class="sort-select" id="sort-select">
        <option value="default">Kolejność domyślna</option>
        <option value="rating">Najlepiej oceniane</option>
        <option value="name">Nazwa A–Z</option>
        <option value="cal-asc">Kalorie rosnąco</option>
        <option value="cal-desc">Kalorie malejąco</option>
        <option value="protein">Białko (max)</option>
      </select>
    </div>
    <div id="recipe-grid">
      <div class="loading">Ladowanie przepisow...</div>
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-illustration" id="modal-illustration"></div>
    <div class="modal-header">
      <div class="modal-title-block">
        <div class="modal-slot" id="modal-slot"></div>
        <div class="modal-name" id="modal-name"></div>
      </div>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let allRecipes = [];
let activeSlots = new Set();
let activeTags = new Set();

const slotNames = {
  1: 'Śniadanie', 2: 'Drugie śniadanie', 3: 'Obiad',
  4: 'Kolacja', 99: 'Przekąska'
};

// ── SVG ILLUSTRATIONS ─────────────────────────────────────────────────────────
function S(bg, body) {
  return `<svg viewBox="0 0 280 220" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="220" fill="${bg}"/>${body}</svg>`;
}

const SVG = {
  pizza: S('#FFF3E0',`
    <circle cx="140" cy="115" r="82" fill="#D4622A"/>
    <circle cx="140" cy="115" r="74" fill="#EF4444"/>
    <circle cx="140" cy="115" r="65" fill="#FDE68A"/>
    <line x1="140" y1="33" x2="140" y2="115" stroke="#D4622A" stroke-width="2.5"/>
    <line x1="69" y1="156" x2="140" y2="115" stroke="#D4622A" stroke-width="2.5"/>
    <line x1="211" y1="156" x2="140" y2="115" stroke="#D4622A" stroke-width="2.5"/>
    <circle cx="118" cy="92" r="8" fill="#EF4444"/>
    <circle cx="162" cy="98" r="8" fill="#EF4444"/>
    <circle cx="130" cy="130" r="8" fill="#EF4444"/>
    <circle cx="162" cy="130" r="7" fill="#16A34A"/>
    <circle cx="115" cy="118" r="6" fill="#16A34A"/>`),

  makaron: S('#FFFBEB',`
    <path d="M58 130 Q58 188 140 188 Q222 188 222 130 Z" fill="#D97706"/>

// ── NAME → ILLUSTRATION MATCHING ────────────────────────────────────────────
const NAME_RULES = [
  [['pizza','zapiekanka'],       'pizza'],
  [['makaron','spaghetti','penne','pasta','lasagn','tagliatel','kluski'],  'makaron'],
  [['kurczak','kura ','drób','pierś','udka z kur'],  'kurczak'],
  [['łosoś','dorsz','tuńczyk','ryba','ryby','krewetki','łososia','śledź','pstrąg','mintaj','sola ','roladki z pieczoną'], 'ryba'],
  [['jajecznic','szakszuka'],    'jajka'],
  [['omlet'],                    'omlet'],
  [['jajk'],                     'jajka'],
  [['tofu'],                     'tofu'],
  [['owsian','owsianka'],        'owsianka'],
  [['sałat'],                    'sałatka'],
  [['zupa','krem z','rosół','barszcz','żurek','bulion'],  'zupa'],
  [['kanapk','tost'],            'kanapki'],
  [['smoothie','koktajl'],       'smoothie'],
  [['naleśnik','crepe','placuszk'],  'naleśniki'],
  [['ryż'],                      'ryż'],
  [['wrap','burrito','spring roll','fajita','tortill'],  'wrap'],
  [['jogurt'],                   'jogurt'],
  [['wafl'],                     'wafle'],
  [['granola'],                  'granola'],
  [['kasza','pęczak','kaszott','gryczana','jaglana'],  'kasza'],
  [['gnocchi'],                  'gnocchi'],
  [['kotlet','schnitzel','burger'],  'kotlet'],
  [['chia','pudding'],           'chia'],
  [['bowl'],                     'bowl'],
];

function getIllustrationKey(name) {
  const n = name.toLowerCase();
  for (const [keywords, key] of NAME_RULES) {
    if (keywords.some(k => n.includes(k))) return key;
  }
  return null;
}

// gradient fallback — unique colour per recipe name
function nameToHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return h % 360;
}
function gradientSvg(name) {
  const hue = nameToHue(name);
  const c1 = `hsl(${hue},55%,88%)`;
  const c2 = `hsl(${(hue+40)%360},60%,78%)`;
  const initials = name.replace(/\(.*?\)/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
  return `<svg viewBox="0 0 280 220" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>
    <rect width="280" height="220" fill="url(#g)"/>
    <text x="140" y="135" text-anchor="middle" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="88" font-weight="700" fill="white" opacity=".35">${initials}</text>
  </svg>`;
}

function getIllustration(recipe) {
  const key = getIllustrationKey(recipe.name);
  return key && SVG[key] ? SVG[key] : gradientSvg(recipe.name);
}

// ── RATINGS ──────────────────────────────────────────────────────────────────
const RATINGS = {
  token: '',  // wklej GitHub PAT (scope: gist) — NIE commituj tokena
  gistId: '',               // uzupełniane automatycznie przy pierwszym zapisie
  filename: 'rerespo-ratings.json'
};

// { users: { nick: { recipeId: stars } } }
let ratingsData = { users: {} };
let ratingsLoaded = false;

// ── nick ──
function getSavedNick() {
  return localStorage.getItem('rerespo-nick') || null;
}
function saveNick(nick) {
  localStorage.setItem('rerespo-nick', nick);
}

// ── gist I/O ──
async function fetchRatings() {
  if (!RATINGS.gistId) return;
  try {
    const headers = RATINGS.token ? { Authorization: `token ${RATINGS.token}` } : {};
    const res = await fetch(`https://api.github.com/gists/${RATINGS.gistId}`, { headers });
    if (!res.ok) return;
    const data = await res.json();
    const content = data.files?.[RATINGS.filename]?.content;
    if (content) ratingsData = JSON.parse(content);
    ratingsLoaded = true;
  } catch (e) { console.warn('Ratings unavailable', e); }
}

async function saveRatings() {
  if (!RATINGS.token) return;
  const body = { files: { [RATINGS.filename]: { content: JSON.stringify(ratingsData, null, 2) } } };
  if (RATINGS.gistId) {
    await fetch(`https://api.github.com/gists/${RATINGS.gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${RATINGS.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } else {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { Authorization: `token ${RATINGS.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...body, description: 'ReRespo ratings', public: false })
    });
    const d = await res.json();
    RATINGS.gistId = d.id;
    console.info('Gist created:', d.id, d.html_url);
  }
}

// ── computed ──
function getAvg(recipeId) {
  const votes = Object.values(ratingsData.users)
    .map(u => u[recipeId])
    .filter(v => v !== undefined);
  if (!votes.length) return null;
  return { avg: votes.reduce((a, b) => a + b, 0) / votes.length, count: votes.length };
}

function myRating(recipeId) {
  const nick = getSavedNick();
  if (!nick) return null;
  return ratingsData.users[nick]?.[recipeId] ?? null;
}

// ── nick dialog ──
let pendingRating = null;

function showNickDialog(recipeId, stars) {
  pendingRating = { recipeId, stars };
  const existing = getSavedNick();
  document.getElementById('nick-input').value = existing || '';
  document.getElementById('nick-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nick-input').focus(), 50);
}

function closeNickDialog() {
  document.getElementById('nick-overlay').classList.remove('open');
  pendingRating = null;
}

async function confirmNick() {
  const raw = document.getElementById('nick-input').value.trim();
  if (!raw) { document.getElementById('nick-input').focus(); return; }
  const nick = raw.toLowerCase().replace(/\s+/g, '_').slice(0, 30);

  // load fresh data before checking nick existence
  await fetchRatings();
  const isReturning = !!ratingsData.users[nick];
  saveNick(nick);
  closeNickDialog();

  showToast(isReturning ? `Witaj z powrotem, ${nick}! 👋` : `Cześć, ${nick}! Oceny są teraz zapisywane.`);

  const pending = pendingRating;
  pendingRating = null;
  if (pending) await doRate(nick, pending.recipeId, pending.stars);
  else { render(); refreshModalRating(document.getElementById('modal-rating-block')?.dataset.recipe); }
}

// ── rating I/O ──
async function doRate(nick, recipeId, stars) {
  if (!RATINGS.token) { showToast('Ocenianie niedostępne.', true); return; }
  await fetchRatings();
  if (!ratingsData.users[nick]) ratingsData.users[nick] = {};
  ratingsData.users[nick][recipeId] = stars;
  render();
  refreshModalRating(recipeId);
  await saveRatings();
  showToast('Ocena zapisana ✓');
}

async function submitRating(recipeId, stars) {
  if (!RATINGS.token) { showToast('Ocenianie niedostępne.', true); return; }
  const nick = getSavedNick();
  if (!nick) { showNickDialog(recipeId, stars); return; }
  await doRate(nick, recipeId, stars);
}

// ── toast ──
function showToast(msg, error = false) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'toast' + (error ? ' toast-error' : '') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── star rendering ──
function starsHtml(recipeId, size = 15) {
  const info = getAvg(recipeId);
  const avg = info?.avg ?? 0;
  const mine = myRating(recipeId);
  const displayAvg = mine ?? avg;
  const canClick = !!RATINGS.token && mine === null;
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const filled = displayAvg >= i - 0.5;
    html += `<span class="star${filled ? ' filled' : ''}${canClick ? ' clickable' : ''}"
      style="font-size:${size}px" data-star="${i}" data-recipe="${recipeId}">★</span>`;
  }
  return `<div class="stars-row" data-recipe="${recipeId}">${html}</div>`;
}

function bindStarClicks(container) {
  if (!container) return;
  container.querySelectorAll('.star.clickable').forEach(star => {
    star.addEventListener('mouseenter', () => {
      const row = star.closest('.stars-row');
      const n = +star.dataset.star;
      row.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', i < n));
    });
    star.addEventListener('mouseleave', () => {
      const row = star.closest('.stars-row');
      const avg = getAvg(row.dataset.recipe)?.avg ?? 0;
      row.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', avg >= i + 0.5));
    });
    star.addEventListener('click', () => submitRating(star.dataset.recipe, +star.dataset.star));
  });
}

function refreshModalRating(recipeId) {
  const block = document.getElementById('modal-rating-block');
  if (!block || !recipeId || block.dataset.recipe !== recipeId) return;
  block.innerHTML = modalRatingHtml(recipeId);
  bindStarClicks(block);
}

function modalRatingHtml(recipeId) {
  const info = getAvg(recipeId);
  const mine = myRating(recipeId);
  const nick = getSavedNick();
  const countText = info
    ? `${info.avg.toFixed(1)} · ${info.count} ${info.count === 1 ? 'ocena' : info.count < 5 ? 'oceny' : 'ocen'}`
    : 'Brak ocen';
  const badge = mine ? `<span class="rating-voted-badge">Twoja ocena: ${mine}★</span>` : '';
  const label = mine
    ? `Oceniłeś${nick ? ` jako <b>${nick}</b>` : ''}`
    : (nick ? `Oceń przepis jako <b>${nick}</b>` : 'Oceń przepis');
  return `
    <span class="modal-rating-label">${label}:</span>
    ${starsHtml(recipeId, 22)}
    <span class="modal-rating-info">${countText}</span>
    ${badge}
  `;
}

async function loadRecipes() {
  const res = await fetch('./recipes.json');
  const data = await res.json();
  allRecipes = data.recipes || [];
  buildFilters();
  render();
  // load ratings in background, re-render when ready
  fetchRatings().then(() => { if (ratingsLoaded) render(); });
}

function buildFilters() {
  // slots
  const slots = [...new Set(allRecipes.map(r => r.meal_slot?.number).filter(Boolean))].sort((a,b)=>a-b);
  const slotGrid = document.getElementById('slot-filters');
  slotGrid.innerHTML = '';
  slots.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn';
    btn.textContent = slotNames[s] || `Posiłek ${s}`;
    btn.title = slotNames[s] || `Posiłek ${s}`;
    btn.dataset.slot = s;
    btn.addEventListener('click', () => {
      activeSlots.has(s) ? activeSlots.delete(s) : activeSlots.add(s);
      btn.classList.toggle('active');
      render();
    });
    slotGrid.appendChild(btn);
  });

  // tags
  const tagCount = {};
  allRecipes.forEach(r => (r.tags || []).forEach(t => tagCount[t] = (tagCount[t]||0)+1));
  const tags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  const tagCloud = document.getElementById('tag-filters');
  tagCloud.innerHTML = '';
  tags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.textContent = tag;
    pill.addEventListener('click', () => {
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      pill.classList.toggle('active');
      render();
    });
    tagCloud.appendChild(pill);
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const calMin = parseInt(document.getElementById('cal-min').value) || 0;
  const calMax = parseInt(document.getElementById('cal-max').value) || Infinity;
  const sort = document.getElementById('sort-select').value;

  let list = allRecipes.filter(r => {
    if (activeSlots.size && !activeSlots.has(r.meal_slot?.number)) return false;
    if (activeTags.size && !([...activeTags].every(t => (r.tags||[]).includes(t)))) return false;
    const cal = r.nutrition?.calories || 0;
    if (cal < calMin || cal > calMax) return false;
    if (q) {
      const haystack = [
        r.name,
        ...(r.tags||[]),
        ...(r.ingredients||[]).map(i=>i.name),
        ...(r.steps||[]).map(s=>s.description)
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'name') list.sort((a,b)=>a.name.localeCompare(b.name,'pl'));
  else if (sort === 'cal-asc') list.sort((a,b)=>(a.nutrition?.calories||0)-(b.nutrition?.calories||0));
  else if (sort === 'cal-desc') list.sort((a,b)=>(b.nutrition?.calories||0)-(a.nutrition?.calories||0));
  else if (sort === 'protein') list.sort((a,b)=>(b.nutrition?.macros?.protein_g||0)-(a.nutrition?.macros?.protein_g||0));
  else if (sort === 'rating') list.sort((a,b)=>(getAvg(b.id)?.avg||0)-(getAvg(a.id)?.avg||0));

  return list;
}

function formatSlot(r) {
  const n = r.meal_slot?.number;
  const tw = r.meal_slot?.time_window;
  const from = tw?.from, to = tw?.to;
  const time = from && to ? ` · ${from}–${to}` : '';
  return n ? `${slotNames[n] || `Posiłek ${n}`}${time}` : '';
}

function render() {
  const list = getFiltered();
  document.getElementById('results-count').textContent = `${list.length} przepisow`;
  const grid = document.getElementById('recipe-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:#ccc;margin:0 auto 12px;display:block"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>Brak przepisow spelniajacych kryteria.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(r => {
    const n = r.nutrition || {};
    const m = n.macros || {};
    const tags = (r.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
    const ratingInfo = getAvg(r.id);
    const ratingHtml = `<div class="card-rating">
      ${starsHtml(r.id, 14)}
      ${ratingInfo ? `<span class="rating-avg">${ratingInfo.avg.toFixed(1)}</span><span class="rating-count">(${ratingInfo.count})</span>` : '<span class="rating-count">brak ocen</span>'}
    </div>`;
    return `<div class="recipe-card" data-id="${r.id}" tabindex="0">
      <div class="card-illustration">${getIllustration(r)}</div>
      <div class="card-body">
        <div class="card-slot">${formatSlot(r)}</div>
        <div class="card-name">${r.name}</div>
        ${ratingHtml}
        <div class="card-macros">
          <div class="macro-box kcal"><span class="val">${n.calories||'–'}</span><span class="lbl">kcal</span></div>
          <div class="macro-box protein"><span class="val">${m.protein_g||'–'}g</span><span class="lbl">Bialko</span></div>
          <div class="macro-box"><span class="val">${m.carbs_g||'–'}g</span><span class="lbl">Wegle</span></div>
          <div class="macro-box"><span class="val">${m.fat_g||'–'}g</span><span class="lbl">Tluszcz</span></div>
        </div>
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.stars-row')) return; // don't open modal when clicking stars
      openModal(card.dataset.id);
    });
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openModal(card.dataset.id); });
  });
  bindStarClicks(grid);
}

function openModal(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;
  const n = r.nutrition || {};
  const m = n.macros || {};

  document.getElementById('modal-illustration').innerHTML = getIllustration(r);
  document.getElementById('modal-slot').textContent = formatSlot(r);
  document.getElementById('modal-name').textContent = r.name;

  const ingredients = (r.ingredients||[]).map(i => `
    <li>
      <span class="ing-name">${i.name}</span>
      <span>
        <span class="ing-amount">${i.amount} ${i.unit}</span>
        ${i.serving_description ? `<span class="ing-desc">(${i.serving_description})</span>` : ''}
      </span>
    </li>`).join('');

  const steps = (r.steps||[]).sort((a,b)=>a.order-b.order).map(s => {
    const dur = s.duration_minutes?.min || s.duration_minutes?.max
      ? ` <span class="step-badge">${[s.duration_minutes.min,s.duration_minutes.max].filter(Boolean).join('–')} min</span>` : '';
    const tech = s.technique && s.technique!=='inne' ? `<span class="step-badge">${s.technique}</span>` : '';
    return `<li class="step-item">
      <div class="step-num">${s.order}</div>
      <div class="step-content">
        <div class="step-desc">${s.description}</div>
        ${dur||tech ? `<div class="step-meta">${tech}${dur}</div>` : ''}
      </div>
    </li>`;
  }).join('');

  const tags = (r.tags||[]).map(t=>`<span class="modal-tag">${t}</span>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-rating" id="modal-rating-block" data-recipe="${r.id}">
      ${modalRatingHtml(r.id)}
    </div>
    <div class="modal-macros">
      <div class="modal-macro kcal"><div class="val">${n.calories||'–'}</div><div class="lbl">kcal</div></div>
      <div class="modal-macro protein"><div class="val">${m.protein_g||'–'} g</div><div class="lbl">Bialko</div></div>
      <div class="modal-macro"><div class="val">${m.carbs_g||'–'} g</div><div class="lbl">Weglowodany</div></div>
      <div class="modal-macro"><div class="val">${m.fat_g||'–'} g</div><div class="lbl">Tluszcze</div></div>
    </div>
    ${ingredients ? `<p class="section-title">Skladniki</p><ul class="ingredient-list">${ingredients}</ul>` : ''}
    ${steps ? `<p class="section-title">Przygotowanie</p><ol class="steps-list">${steps}</ol>` : ''}
    ${tags ? `<p class="section-title">Tagi</p><div class="modal-tags">${tags}</div>` : ''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  bindStarClicks(document.getElementById('modal-rating-block'));
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// events
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort-select').addEventListener('change', render);
document.getElementById('cal-min').addEventListener('input', render);
document.getElementById('cal-max').addEventListener('input', render);

document.getElementById('reset-filters').addEventListener('click', () => {
  activeSlots.clear();
  activeTags.clear();
  document.querySelectorAll('.slot-btn.active, .tag-pill.active').forEach(el => el.classList.remove('active'));
  document.getElementById('search').value = '';
  document.getElementById('cal-min').value = '';
  document.getElementById('cal-max').value = '';
  document.getElementById('sort-select').value = 'default';
  render();
});

loadRecipes().catch(err => {
  document.getElementById('recipe-grid').innerHTML =
    `<div class="empty-state"><p>Blad ladowania: ${err.message}</p><p style="font-size:12px;margin-top:8px">Uruchom serwer HTTP w tym folderze, np.:<br><code>python3 -m http.server 8080</code></p></div>`;
});
// nick dialog events
document.getElementById('nick-confirm').addEventListener('click', confirmNick);
document.getElementById('nick-cancel').addEventListener('click', closeNickDialog);
document.getElementById('nick-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmNick(); if (e.key === 'Escape') closeNickDialog(); });
document.getElementById('nick-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeNickDialog(); });
</script>
